<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phòng Chat Với Người Lạ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; background: #fff; position: relative; }
        
        header { 
            background: #0084ff; color: #fff; padding: 12px; text-align: center; 
            font-weight: bold; flex-shrink: 0; position: relative; display: flex;
            justify-content: center; align-items: center;
        }
        #btn-logout { 
            position: absolute; left: 10px; background: rgba(255,255,255,0.2); 
            border: none; color: #fff; padding: 4px 10px; border-radius: 4px; 
            font-size: 11px; cursor: pointer;
        }

        #admin-lock { position: absolute; right: 15px; cursor: pointer; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fff; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; display: flex; flex-direction: column; }
        .me { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 2px; }
        .user { align-self: flex-start; background: #e4e6eb; color: #000; border-bottom-left-radius: 2px; }
        
        /* CSS cho thời gian */
        .time { font-size: 9px; opacity: 0.7; margin-top: 4px; align-self: flex-end; }
        .me .time { color: #eee; }
        .user .time { color: #666; }

        .adm-tag { color: #FFD700; font-weight: bold; text-shadow: 1px 1px #000; margin-right: 4px; }
        .announcement { align-self: center; background: #fff3cd; color: #856404; width: 90%; border-radius: 8px; text-align: center; font-weight: bold; padding: 8px; font-size: 12px; border: 1px solid #ffeeba; margin: 5px 0; }
        .del { color: #ff4757; font-size: 10px; margin-left: 8px; cursor: pointer; font-weight: normal; opacity: 0.7; }

        #tools { background: #fff0f0; border-top: 1px solid #ffcccc; padding: 5px; display: flex; justify-content: center; gap: 10px; }
        .input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 5px; background: #fff; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-send { border-radius: 20px; border: none; background: #0084ff; color: #fff; padding: 0 15px; font-weight: bold; cursor: pointer; }
        
        #login, #admin-modal { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #admin-modal { background: rgba(0,0,0,0.8); color: #fff; z-index: 200; }
        .modal-box { background: #fff; padding: 20px; border-radius: 12px; width: 280px; text-align: center; color: #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <div id="login">
            <h2 style="color:#0084ff">Chat Free</h2>
            <input type="text" id="u-name" placeholder="Tên bạn..." style="width:240px; padding:12px; border-radius:25px; border:1px solid #ddd; margin-bottom:10px; text-align:center;">
            <button onclick="checkNameAndJoin()" style="padding:10px 40px; border-radius:25px; border:none; background:#0084ff; color:white; font-weight:bold; cursor:pointer;">VÀO CHAT</button>
        </div>

        <div id="admin-modal" class="hidden">
            <div class="modal-box">
                <h3 id="adm-title">XÁC MINH BOSS</h3>
                <input type="text" id="ad-u" placeholder="User" style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #ccc; border-radius:5px;">
                <input type="password" id="ad-p" placeholder="Pass" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                <button onclick="checkAdmin()" style="width:100%; padding:10px; background:#ff4757; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">XÁC NHẬN</button>
                <p id="cancel-btn" onclick="closeAdmin()" style="cursor:pointer; margin-top:10px; font-size:12px; text-decoration:underline; color:#666;">Hủy bỏ</p>
            </div>
        </div>

        <header> 
            <button id="btn-logout" onclick="logout()">Thoát</button>
            PHÒNG CHAT 
            <span id="admin-lock" onclick="openAdmin()">🔒</span> 
        </header>
        
        <div id="chat-box"></div>

        <div id="tools" class="hidden">
            <button onclick="sendAlert()" style="background:#ff4757; color:white; border:none; padding:4px 12px; border-radius:5px; font-size:10px; font-weight:bold;">📢 THÔNG BÁO</button>
            <label style="font-size:11px; display:flex; align-items:center; gap:3px;"><input type="checkbox" id="anon" onchange="setAnon()"> Ẩn danh</label>
        </div>

        <div class="input-area">
            <input type="text" id="msg" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="btn-send">Gửi</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBePJ8qaOtHcBSKak-gdVH2qnjZDekkgqI",
        authDomain: "chat-voi-nguoi-la12.firebaseapp.com",
        databaseURL: "https://chat-voi-nguoi-la12-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-voi-nguoi-la12",
        storageBucket: "chat-voi-nguoi-la12.firebasestorage.app",
        messagingSenderId: "514146383665",
        appId: "1:514146383665:web:e9e0298c3ba1f3f8972210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let name = ""; 
    let isAdmin = false;
    const badWords = ["dm", "vcl", "địt", "cặc", "ngu", "óc chó", "clmm", "đm", "đmm", "cc","lồn","súc vật"];

    window.onload = function() {
        const savedName = localStorage.getItem("chat_user_name");
        if (savedName) {
            name = savedName;
            if (name.startsWith("ADMIN_")) {
                isAdmin = true;
                document.getElementById('tools').classList.remove('hidden');
                document.getElementById('admin-lock').innerText = "👑";
            }
            document.getElementById('login').classList.add('hidden');
            joinChat();
        }
    };

    function checkNameAndJoin() {
        const val = document.getElementById('u-name').value.trim();
        if(!val) return alert("Nhập tên đã!");
        if(val.toLowerCase().includes("giangdz")) { openAdmin(); return; }
        
        db.ref("online_users").child(val).once("value", (snapshot) => {
            if(snapshot.exists()) { alert("Tên này có người dùng rồi!"); } 
            else {
                name = val;
                localStorage.setItem("chat_user_name", name);
                joinChat();
            }
        });
    }

    function joinChat() {
        db.ref("online_users").child(name).set(true);
        db.ref("online_users").child(name).onDisconnect().remove();
        document.getElementById('login').classList.add('hidden');
        listen();
    }

    function logout() {
        if(confirm("Bạn muốn thoát phòng chat?")) {
            if(name) db.ref("online_users").child(name).remove();
            localStorage.removeItem("chat_user_name");
            location.reload();
        }
    }

    function openAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
    function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

    function checkAdmin() {
        const inputU = document.getElementById('ad-u').value.trim();
        const inputP = document.getElementById('ad-p').value.trim();
        db.ref("admin_config").once("value", (snapshot) => {
            const config = snapshot.val();
            if(config && inputU === config.user && inputP === config.pass) {
                isAdmin = true;
                db.ref("admin_sessions").once("value", (snap) => {
                    let count = snap.numChildren();
                    name = "ADMIN_Giangdz" + (count === 0 ? "" : (count + 1));
                    localStorage.setItem("chat_user_name", name);
                    db.ref("admin_sessions").push().set(true);
                    document.getElementById('tools').classList.remove('hidden');
                    document.getElementById('login').classList.add('hidden');
                    document.getElementById('admin-lock').innerText = "👑";
                    closeAdmin();
                    listen();
                });
            } else { alert("Sai Tên Hoặc Mật Khẩu!"); }
        });
    }

    function formatTime(ts) {
        return new Intl.DateTimeFormat('vi-VN', { hour: '2-digit', minute: '2-digit' }).format(ts);
    }

    function send() {
        const m = document.getElementById('msg');
        let content = m.value.trim();
        if(!content || !name) return;
        if(!isAdmin) {
            if(badWords.some(word => content.toLowerCase().includes(word))) { 
                alert("Mất dạy thế!"); m.value = ""; return; 
            }
        }
        db.ref("messages").push().set({ s: name, c: content, t: Date.now(), type: 'text' });
        m.value = "";
    }

    function sendAlert() {
        const msg = prompt("Nội dung thông báo:");
        if(msg) db.ref("messages").push().set({ s: "HỆ THỐNG", c: msg, t: Date.now(), type: 'alert' });
    }

    function del(id, senderName) { 
        if(isAdmin || senderName === name) {
            if(confirm("Xóa tin nhắn này nhé?")) db.ref("messages").child(id).remove();
        }
    }

    function setAnon() {
        if(document.getElementById('anon').checked) { window.old = name; name = "Người dùng ẩn danh🕵️‍♂️"; }
        else { name = window.old || name; }
    }

    function listen() {
        db.ref("messages").on("value", (s) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach((c) => {
                const d = c.val();
                const div = document.createElement('div');
                const timeStr = formatTime(d.t);
                
                if(d.type === 'alert') {
                    div.className = "announcement";
                    let delBtn = isAdmin ? `<span class="del" onclick="del('${c.key}', '${d.s}')">(Xóa)</span>` : "";
                    div.innerHTML = `⚠️ ${d.c} ${delBtn}`;
                } else {
                    div.className = `msg ${d.s === name ? 'me' : 'user'}`;
                    let displayName = d.s.startsWith("ADMIN_") ? `<span class="adm-tag">(ADMIN)</span>${d.s.replace("ADMIN_", "")}` : d.s;
                    let delBtn = (isAdmin || d.s === name) ? `<span class="del" onclick="del('${c.key}', '${d.s}')">x</span>` : "";
                    
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                            <b style="font-size:10px;">${displayName}</b>
                            ${delBtn}
                        </div>
                        <span>${d.c}</span>
                        <span class="time">${timeStr}</span>
                    `;
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
